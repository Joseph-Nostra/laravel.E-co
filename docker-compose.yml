version: '3.8'
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-eco-app
    container_name: eco-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "9000:9000"
    networks:
      - eco-network

  db:
    image: mysql:8.0
    container_name: eco-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_eco}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3307:3306"
    volumes:
      - eco-db-data:/var/lib/mysql
    networks:
      - eco-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: eco-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    networks:
      - eco-network

  nginx:
    image: nginx:alpine
    container_name: eco-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - .:/var/www
      - .docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - eco-network

networks:
  eco-network:
    driver: bridge

volumes:
  eco-db-data:
