version: '3.8'
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-eco-app
    container_name: eco-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - eco-network

  db:
    image: mysql:8.0
    container_name: eco-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - eco-db-data:/var/lib/mysql
    networks:
      - eco-network

  nginx:
    image: nginx:alpine
    container_name: eco-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - .:/var/www
      - .docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - eco-network

networks:
  eco-network:
    driver: bridge

volumes:
  eco-db-data:
